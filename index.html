<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Vortexr</title>
    <style>
      body { margin: 0; font-family: sans-serif; }
      #debug-panel {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.85);
        color: #fff;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 9999;
        min-width: 220px;
        border: 1px solid #333;
      }
      #debug-panel h3 { margin: 0 0 10px 0; font-size: 13px; color: #aaa; }
      .slider-row { margin-bottom: 8px; }
      .slider-row label { display: flex; justify-content: space-between; margin-bottom: 3px; color: #888; }
      .slider-row input[type=range] { width: 100%; height: 4px; }
      #status { margin-top: 10px; font-size: 11px; color: #555; }
    </style>
  </head>
  <body style="margin: 0">
    <div id="scene-container"></div>
    <div id="debug-panel">
      <h3>Touch Debug</h3>
      <div class="slider-row">
        <label><span>Touch Radius</span><span id="v-touchRadius">0.30</span></label>
        <input type="range" id="s-touchRadius" min="0.05" max="2.0" step="0.05" value="0.30">
      </div>
      <div class="slider-row">
        <label><span>Tunnel Radius</span><span id="v-tunnelRadius">1.50</span></label>
        <input type="range" id="s-tunnelRadius" min="0.5" max="4.0" step="0.1" value="3.00">
      </div>
      <div class="slider-row">
        <label><span>Beat Scale</span><span id="v-beatScale">1.50</span></label>
        <input type="range" id="s-beatScale" min="0.0" max="3.0" step="0.1" value="2.40">
      </div>
      <div class="slider-row">
        <label><span>Touch Flash Scale</span><span id="v-touchFlashScale">2.00</span></label>
        <input type="range" id="s-touchFlashScale" min="1.0" max="6.0" step="0.25" value="1.50">
      </div>
      <div class="slider-row">
        <label><span>Flash Decay</span><span id="v-touchFlashDecay">0.80</span></label>
        <input type="range" id="s-touchFlashDecay" min="0.1" max="3.0" step="0.1" value="0.40">
      </div>
      <div class="slider-row">
        <label><span>Rings Ahead</span><span id="v-ringsAhead">12</span></label>
        <input type="range" id="s-ringsAhead" min="1" max="50" step="1" value="12">
      </div>
      <div id="status">Ready</div>
    </div>
    <script type="module" src="/src/index.ts"></script>
    <script>
      // Expose debug config globally so the app can read it
      window.__debugConfig = {
        touchRadius: 0.30,
        tunnelRadius: 3.00,
        beatScale: 2.40,
        touchFlashScale: 1.50,
        touchFlashDecay: 0.40,
        ringsAhead: 12,
      };
      document.querySelectorAll('input[type=range]').forEach(slider => {
        slider.addEventListener('input', () => {
          const id = slider.id.replace('s-', '');
          const val = parseFloat(slider.value);
          window.__debugConfig[id] = val;
          const display = document.getElementById('v-' + id);
          if (display) display.textContent = id.includes('Decay') ? val.toFixed(2) : val.toFixed(2);
        });
      });
      // Sync initial display values
      document.getElementById('v-touchRadius').textContent = '0.30';
      document.getElementById('v-tunnelRadius').textContent = '3.00';
      document.getElementById('v-beatScale').textContent = '2.40';
      document.getElementById('v-touchFlashScale').textContent = '1.50';
      document.getElementById('v-touchFlashDecay').textContent = '0.40';
      document.getElementById('v-ringsAhead').textContent = '12';
      document.getElementById('s-touchRadius').value = '0.30';
      document.getElementById('s-tunnelRadius').value = '3.00';
      document.getElementById('s-beatScale').value = '2.40';
      document.getElementById('s-touchFlashScale').value = '1.50';
      document.getElementById('s-touchFlashDecay').value = '0.40';
      document.getElementById('s-ringsAhead').value = '12';
    </script>
  </body>
</html>
